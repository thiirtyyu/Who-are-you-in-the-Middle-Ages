<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผู้สร้าง</title>
    <meta name="description" content="End Credits — พบกับสมาชิกกิลด์ผู้สร้างสรรค์แบบทดสอบบุคลิกภาพยุคกลาง">

    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self';
                   script-src 'self';
                   style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
                   font-src https://fonts.gstatic.com;
                   img-src 'self' data:;
                   media-src 'self';
                   connect-src 'self';
                   frame-ancestors 'none';
                   base-uri 'self';
                   form-action 'self';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="no-referrer">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/credits.css">
</head>

<body>
    <div class="credits-page">

        <div class="credits-crest" aria-hidden="true">
            <span class="crest-symbol">⚜</span>
        </div>

        <div class="credits-banner">
            <span class="banner-flourish-left" aria-hidden="true">❧—</span>
            <h1 class="banner-title" id="creditsTitle">จัดทำโดยกลุ่ม VIVII</h1>
            <span class="banner-flourish-right" aria-hidden="true">—❧</span>
        </div>

        <p class="credits-subtitle" id="creditsSubtitle"></p>

        <div class="credits-divider" aria-hidden="true">
            <span class="divider-icon">◆</span>
        </div>

        <div class="credits-roster" id="creditsRoster">
        </div>

        <div class="credits-divider" aria-hidden="true">
            <span class="divider-icon">◆</span>
        </div>

        <div class="credits-footer-banner">
            <span class="footer-deco" aria-hidden="true">— ✦ —</span>
            <p class="footer-motto" id="creditsMotto">ขอขอขอบคุณที่ร่วมผจญภัย</p>
            <span class="footer-deco" aria-hidden="true">— ✦ —</span>
        </div>

        <div class="credits-crest credits-crest-bottom" aria-hidden="true">
            <span class="crest-symbol">⚜</span>
        </div>

        <div class="credits-back-wrap">
            <a href="index.html" class="btn-back-home" id="btnBackHome">↩ กลับสู่หน้าหลัก</a>
        </div>

    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card" id="modalCard">
            <button class="modal-close" id="modalClose" type="button" aria-label="ปิด">✕</button>
            <span class="modal-corner modal-corner-tl" aria-hidden="true"></span>
            <span class="modal-corner modal-corner-tr" aria-hidden="true"></span>
            <span class="modal-corner modal-corner-bl" aria-hidden="true"></span>
            <span class="modal-corner modal-corner-br" aria-hidden="true"></span>
            <span class="modal-star-top" aria-hidden="true"></span>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="js/security.js"></script>
    <script src="js/credits.js"></script>
</body>

</html>
